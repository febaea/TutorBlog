<!doctype html>
<html>
  <head>
    <title>Tutor Profile - TutorHub</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="../imgs/foodie.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <script src="../js/main.js" defer></script>
    <script type="module" src="../js/tutor_profile.js" defer></script>
  </head>
  <body>
    <header>
      <a href="../html/index.html"
        ><img id="logo" src="../imgs/logo.png" alt="TutorHub Logo"
      /></a>
      <h1>TutorHub - Tutor Profile</h1>
      <div class="dropdown">
        <button id="login_link" href="#">
          Account <i class="fa fa-caret-down"></i>
        </button>
        <div class="dropdown-content">
          <a id="logout_btn" href="#">Log out</a>
        </div>
      </div>
    </header>

    <nav>
      <ul>
        <li><a href="../html/index.html">Home</a></li>
        <li><a href="../html/tutors.html">All Tutors</a></li>
        <li id="myBookingsNav" style="display: none">
          <a href="../html/my_bookings.html">My Bookings</a>
        </li>
      </ul>
    </nav>

    <main id="tutorProfileMain">
      <div id="tutorProfileContent">
        <!-- Tutor profile will be loaded  -->
      </div>

      <!-- Booking Modal -->
      <div id="bookingModal" class="modal" style="display: none">
        <div
          class="modal-content"
          style="
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
          "
        >
          <span
            class="close"
            style="float: right; cursor: pointer; font-size: 28px"
            >&times;</span
          >
          <h3 style="margin-bottom: 20px">Confirm Booking</h3>
          <p id="bookingDetails" style="margin: 20px 0"></p>
          <button id="confirmBookingBtn" class="link_btn">
            Confirm Booking
          </button>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2024 TutorHub - Empowering Education</p>
    </footer>
  </body>
</html>
