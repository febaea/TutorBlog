<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Two-Factor Authentication</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/2fa.js" defer></script>
    
    
</head>

<body class = verify_body>
    <div class="twofa_container">
        <h2>Two-Factor Authentication</h2>
        <p>Enter the 6-digit code from your authenticator app</p>
        <input type="text" id="token" maxlength="6" placeholder="123456" class = code_input>
        <button class = verify_b onclick="verify2FA()">Verify</button>
        <div class="msg" id="msg"></div>
    </div>
</body>
</html>
